
---
- name: Replace disk on a Kubernetes node with NVMe device
  hosts: "{{ site }}_ecp_w"
  become: true
  gather_facts: false

  vars_prompt:
    - name: nvme_devices
      prompt: "Enter the NVMe device name (e.g., /dev/nvme0n1)"
      private: no

  tasks:
    - name: Display the entered device name
      debug:
        msg: "Using devices: {{ nvme_devices }}"

    - name: Overwrite the NVMe disk with zeros
      shell: "dd if=/dev/zero of={{ item }} bs=1M count=1000"
      loop: "{{ nvme_devices.split() }}"


    - name: Execute steps in ERE
      pause:
        prompt: "Execute steps in ERE"

    - name: Prevent new pods from creating
      shell: until /usr/bin/kubectl --kubeconfig /etc/kubernetes/admin.conf get node $(hostname) &>/dev/null; do sleep 1; echo "node still not present"; done && kubectl --kubeconfig /etc/kubernetes/admin.conf cordon $(hostname); kubectl --kubeconfig /etc/kubernetes/admin.conf get node $(hostname)

    - name: Restore containerd config
      copy:
        src: /etc/containerd/config.toml_backup
        dest: /etc/containerd/config.toml
        remote_src: true
        mode: preserve

    - name: Restore chrony config
      copy:
        src: /etc/chrony.conf_backup
        dest: /etc/chrony.conf
        remote_src: true
        mode: preserve


    - name: Drain the node
      shell: /usr/bin/kubectl --kubeconfig /etc/kubernetes/admin.conf uncordon k8s-worker01
